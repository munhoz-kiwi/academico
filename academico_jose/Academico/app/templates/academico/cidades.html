{% extends 'academico/base.html' %}

{% block title %}Cidades{% endblock %}

{% block content %}
<div class="page-card">
    <h1>Lista de Cidades</h1>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>UF</th>
                </tr>
            </thead>
            <tbody>
                {% for c in cidades %}
                <tr>
                    <td>{{ c.nome }}</td>
                    <td>{{ c.uf }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2">Nenhum registro encontrado.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
