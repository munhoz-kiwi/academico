{% extends 'academico/base.html' %}

{% block title %}Alunos{% endblock %}

{% block content %}
<div class="page-card">
    <h1>Lista de Alunos</h1>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>Email</th>
                </tr>
            </thead>
            <tbody>
                {% for a in alunos %}
                <tr>
                    <td>{{ a.nome }}</td>
                    <td>{{ a.cpf }}</td>
                    <td>{{ a.email }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3">Nenhum registro encontrado.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
