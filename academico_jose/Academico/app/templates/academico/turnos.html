{% extends 'academico/base.html' %}

{% block title %}Turnos{% endblock %}

{% block content %}
<div class="page-card">
    <h1>Lista de Turnos</h1>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                </tr>
            </thead>
            <tbody>
                {% for t in turnos %}
                <tr>
                    <td>{{ t.nome }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td>Nenhum registro encontrado.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
