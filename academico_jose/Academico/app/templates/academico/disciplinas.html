{% extends 'academico/base.html' %}

{% block title %}Disciplinas{% endblock %}

{% block content %}
<div class="page-card">
    <h1>Lista de Disciplinas</h1>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Área do Saber</th>
                </tr>
            </thead>
            <tbody>
                {% for d in disciplinas %}
                <tr>
                    <td>{{ d.nome }}</td>
                    <td>{{ d.area_saber }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2">Nenhum registro encontrado.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
