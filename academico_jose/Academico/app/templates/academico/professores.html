{% extends 'academico/base.html' %}

{% block title %}Professores{% endblock %}

{% block content %}
<div class="page-card">
    <h1>Lista de Professores</h1>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>Email</th>
                </tr>
            </thead>
            <tbody>
                {% for p in professores %}
                <tr>
                    <td>{{ p.nome }}</td>
                    <td>{{ p.cpf }}</td>
                    <td>{{ p.email }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3">Nenhum registro encontrado.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
